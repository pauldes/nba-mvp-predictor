name: renew
env:
  LOG_LEVEL: INFO
on:
  schedule:
   - cron: "0 12 1 * *" # 12:00 UTC on the 1st of each month
  workflow_dispatch: # Allow for manual trigger from github.com
jobs:
  # These jobs shall run once the model has be trained.
  renew-model:
    runs-on: ubuntu-latest
    steps:
      - name: Download model from artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: model.joblib
          workflow: renew.yaml # Switch between renew.yaml and train.yaml as needed
          path: ./
          search_artifacts: true
      - name: Upload model as artifact (renewed retention)
        uses: actions/upload-artifact@v4
        with: 
          name: model.joblib
          path: ./model.joblib
          retention-days: 40
  renew-model-performances:
    runs-on: ubuntu-latest
    steps:
      - name: Download model performances from artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: performances.csv
          workflow: renew.yaml # Switch between renew.yaml and train.yaml as needed
          path: ./
          search_artifacts: true
      - name: Upload model performances as artifact (renewed retention)
        uses: actions/upload-artifact@v4
        with: 
          name: performances.csv
          path: ./performances.csv
          retention-days: 40
  renew-model-features:
    runs-on: ubuntu-latest
    steps:
      - name: Download features from artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: features.json
          workflow: renew.yaml # Switch between renew.yaml and train.yaml as needed
          path: ./
          search_artifacts: true
      - name: Upload features as artifact (renewed retention)
        uses: actions/upload-artifact@v4
        with: 
          name: features.json
          path: ./features.json
          retention-days: 40

